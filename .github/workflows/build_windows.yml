name: Build Windows

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install yt-dlp and ffmpeg
        run: |
          winget install --id=yt-dlp.yt-dlp -e --accept-source-agreements --accept-package-agreements || pip install yt-dlp
          winget install --id=Gyan.FFmpeg -e --accept-source-agreements --accept-package-agreements || choco install ffmpeg -y
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec --clean
      
      - name: List dist contents
        run: |
          dir dist
      
      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\ChzzkDownloader\* -DestinationPath ChzzkDownloader-Windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChzzkDownloader-Windows
          path: ChzzkDownloader-Windows.zip
          retention-days: 30

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ChzzkDownloader-Windows
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ChzzkDownloader-Windows.zip
          body: |
            ## 🎥 Chzzk Downloader GUI

            치지직(Chzzk) VOD/클립 + YouTube 다운로드 프로그램

            ### ⚠️ 필수 사전 설치

            실행 파일을 사용하기 전에 **yt-dlp**와 **ffmpeg**를 설치해야 합니다.

            **yt-dlp 설치:**
            ```powershell
            winget install yt-dlp
            ```
            또는 공식 다운로드: https://github.com/yt-dlp/yt-dlp/releases/latest

            **ffmpeg 설치:**
            ```powershell
            winget install Gyan.FFmpeg
            ```
            또는 공식 다운로드: https://www.gyan.dev/ffmpeg/builds/

            ---

            ### 📥 다운로드

            | 플랫폼 | 파일 |
            |--------|------|
            | **Windows** | `ChzzkDownloader-Windows.zip` |
            | **macOS** | Python으로 실행 또는 로컬 빌드 |

            ### 🚀 실행 방법 (Python — 모든 플랫폼)
            ```bash
            git clone https://github.com/ThankyouJerry/chzzkdownloader-gui.git
            cd chzzkdownloader-gui
            pip install -r requirements.txt
            python src/main.py
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
