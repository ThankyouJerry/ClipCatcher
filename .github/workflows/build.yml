name: Build Windows Only

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec

      - name: Smoke test packaged app
        run: |
          .\dist\ClipCatcher\ClipCatcher.exe --smoke
      
      - name: List dist contents
        run: |
          dir dist
      
      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist\ClipCatcher\* -DestinationPath ClipCatcher-Windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ClipCatcher-Windows
          path: ClipCatcher-Windows.zip

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout release notes
        uses: actions/checkout@v6

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: ClipCatcher-Windows
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClipCatcher-Windows.zip
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
